services:
  - type: web
    name: taiwan-shopee-ai-studio
    env: node
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: ARK_API_KEY
        sync: false
      - key: ARK_IMAGE_MODEL
        value: doubao-seedream-5-0-260128
      - key: ARK_BASE_URL
        value: https://ark.cn-beijing.volces.com/api/v3
      - key: AIGC51_TOKEN
        sync: false
      - key: APIZ_API_BASE
        value: https://api.apiz.ai
      - key: DMX_API_KEY
        sync: false
      - key: DMX_API_BASE
        value: https://www.dmxapi.cn/v1
      - key: DMX_IMAGE_MODEL
        value: gpt-image-2-ssvip
