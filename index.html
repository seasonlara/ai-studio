<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">A</div>
          <div>
            <strong>AI Studio</strong>
            <span>电商图片工作台</span>
          </div>
        </div>

        <nav class="nav" aria-label="创作类型">
          <button class="nav-item active" type="button" data-mode="suite">
            <span>套</span>
            <strong>一键式生图</strong>
            <small>主图 + 详情页</small>
          </button>
          <button class="nav-item" type="button" data-mode="main">
            <span>主</span>
            <strong>主图生成</strong>
            <small>点击率素材</small>
          </button>
          <button class="nav-item" type="button" data-mode="detail">
            <span>详</span>
            <strong>详情页生成</strong>
            <small>转化说明图</small>
          </button>
        </nav>

        <div class="balance-card">
          <span>可用积分</span>
          <strong id="creditBalance">1,280</strong>
          <button type="button">充值</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="page-head">
          <div>
            <span id="pageKicker" class="kicker">套图工作流</span>
            <h1 id="pageTitle">一键生成虾皮商品套图</h1>
            <p id="pageDescription">适合从一张商品图开始，快速产出上架需要的主图和详情页。</p>
          </div>
          <div class="run-summary">
            <span id="summaryScope">本次 1 张</span>
            <strong><b id="buttonCost">15</b> 积分</strong>
          </div>
        </header>

        <section class="studio-grid">
          <section class="panel upload-panel">
            <div class="panel-head">
              <span>01</span>
              <div>
                <h2>商品图片</h2>
                <p>最多 8 张，建议使用清晰实拍图。</p>
              </div>
            </div>
            <label id="dropZone" class="drop-zone">
              <input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp" multiple />
              <div id="uploadEmpty" class="upload-empty">
                <strong>上传商品图</strong>
                <span>JPG / PNG / WebP</span>
              </div>
              <div id="previewGrid" class="preview-grid" hidden></div>
            </label>
          </section>

          <section class="panel control-panel">
            <div class="panel-head">
              <span>02</span>
              <div>
                <h2>生成任务</h2>
                <p id="modeHint">自动组合主图与详情页。</p>
              </div>
            </div>

            <div class="task-strip" id="taskStrip"></div>

            <div class="form-grid">
              <label class="field wide">
                <span>生成模型</span>
                <select id="modelProvider">
                  <option value="ark">标准稳定</option>
                  <option value="gpt-image-2">文字排版增强</option>
                  <option value="banana-pro">创意质感增强</option>
                </select>
              </label>
              <label class="field">
                <span>生成张数</span>
                <select id="limit">
                  <option value="1">先生成 1 张</option>
                  <option value="4">生成 4 张</option>
                  <option value="16">生成全部</option>
                </select>
              </label>
              <label class="field">
                <span>版面风格</span>
                <select id="stylePreset">
                  <option value="orange">橙色爆款</option>
                  <option value="clean">清爽白底</option>
                  <option value="dark">黑橙质感</option>
                </select>
              </label>
              <label class="field">
                <span>商品类目</span>
                <select id="category">
                  <option value="auto">自动判断</option>
                  <option value="storage">车用 / 收纳</option>
                  <option value="child">母婴 / 儿童</option>
                  <option value="home">居家用品</option>
                  <option value="general">通用商品</option>
                </select>
              </label>
              <label class="field">
                <span>出图目标</span>
                <select id="goal">
                  <option value="balanced">均衡出图</option>
                  <option value="click">提升点击</option>
                  <option value="conversion">强化转化</option>
                </select>
              </label>
            </div>

            <details class="optional-info">
              <summary>补充商品信息</summary>
              <div class="form-grid">
                <label class="field">
                  <span>商品名称</span>
                  <input id="productName" placeholder="例如：车用座椅收纳袋" />
                </label>
                <label class="field">
                  <span>核心卖点</span>
                  <input id="coreBenefit" placeholder="例如：多格分类、随手拿取" />
                </label>
                <label class="field wide">
                  <span>材质 / 尺寸 / 包装</span>
                  <textarea id="extraInfo" placeholder="例如：牛津布，适用于多数汽车座椅，1 入装"></textarea>
                </label>
                <label class="field wide">
                  <span>必须保留或避免</span>
                  <textarea id="constraints" placeholder="例如：不要添加品牌 Logo；不要写未经确认的防水等级"></textarea>
                </label>
              </div>
            </details>

            <button id="generateBtn" class="generate-button" type="button">
              <span id="generateLabel">开始生成套图</span>
              <small id="generateSubtext">上传图片后可生成</small>
            </button>
          </section>
        </section>

        <section class="status-row">
          <article>
            <span>任务状态</span>
            <strong id="taskStatus">等待上传</strong>
          </article>
          <article>
            <span>生成内容</span>
            <strong id="taskCount">未创建</strong>
          </article>
          <article>
            <span>当前页面</span>
            <strong id="currentModeLabel">一键式生图</strong>
          </article>
        </section>

        <section class="panel results-panel">
          <div class="results-head">
            <div>
              <h2>生成结果</h2>
              <p id="resultHint">结果会保留在当前页面，可直接下载。</p>
            </div>
            <button id="clearBtn" type="button">清空</button>
          </div>
          <div id="resultGrid" class="result-grid empty-state">
            <div>
              <strong>等待生成</strong>
              <span>完成后会在这里显示图片。</span>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
